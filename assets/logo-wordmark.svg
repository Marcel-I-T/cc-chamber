<svg width="640" height="160" viewBox="0 0 640 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="cc-chamber">
  <defs>
    <linearGradient id="accentGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Mark on the left -->
  <g transform="translate(0, 0)">
    <rect width="160" height="160" rx="30" fill="#15151a"/>
    <rect x="0.5" y="0.5" width="159" height="159" rx="29.5" stroke="#2a2a33"/>

    <g stroke="#e8e8ec" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M 60 40 L 120 40 L 120 100 L 60 100 Z" opacity="0.35"/>
      <path d="M 40 60 L 100 60 L 100 120 L 40 120 Z" fill="rgba(167, 139, 250, 0.06)"/>
      <line x1="60" y1="40" x2="40" y2="60" opacity="0.65"/>
      <line x1="120" y1="40" x2="100" y2="60" opacity="0.65"/>
      <line x1="120" y1="100" x2="100" y2="120" opacity="0.65"/>
      <line x1="60" y1="100" x2="40" y2="120" opacity="0.35"/>
    </g>
    <rect x="65" y="80" width="18" height="18" fill="url(#accentGrad2)" rx="1.5"/>

    <text x="112" y="132" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="14" font-weight="700" fill="#a78bfa">›_</text>
  </g>

  <!-- Wordmark on the right -->
  <g transform="translate(190, 0)">
    <text
      x="0"
      y="98"
      font-family="JetBrains Mono, SF Mono, Menlo, monospace"
      font-size="56"
      font-weight="700"
      letter-spacing="-2"
    >
      <tspan fill="#a78bfa">cc</tspan><tspan fill="#3a3a45">-</tspan><tspan fill="#e8e8ec">chamber</tspan>
    </text>
    <text
      x="2"
      y="128"
      font-family="Inter, system-ui, sans-serif"
      font-size="16"
      fill="#6b6b7a"
      letter-spacing="0.5"
    >
      a clean desktop room for Claude Code
    </text>
  </g>
</svg>
